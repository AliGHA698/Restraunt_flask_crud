{% extends "base.html" %}

{% block content %}

<h2>Search Customer By ID</h2>

<form method="post">

    <input
        type="number"
        name="id"
        placeholder="Customer ID">

    <button type="submit">
        Search
    </button>

</form>

<hr>

{% if customer %}

<p>ID: {{ customer.id }}</p>
<p>Name: {{ customer.customer_name }}</p>
<p>Family: {{ customer.customer_family }}</p>

{% endif %}

{% endblock %}
